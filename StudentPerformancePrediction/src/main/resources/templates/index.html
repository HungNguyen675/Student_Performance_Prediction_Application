<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI Prediction Portal</title>
    <!-- Phông Chữ Của Giới Công Nghệ -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Bầu trời ngàn sao ban đêm */
        body {
            margin: 0; font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #12100e);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Khối Kính Thủy Tinh Huyền Ảo */
        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 100%; max-width: 480px;
            transform: translateY(0); transition: all 0.3s;
        }
        .glass-container:hover { transform: translateY(-5px); box-shadow: 0 15px 40px 0 rgba(78, 205, 196, 0.2); }

        h1 { text-align: center; margin-bottom: 5px; background: linear-gradient(45deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;}
        .subtitle { text-align: center; color: #a0a5b1; margin-bottom: 30px; font-size: 0.9rem; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.95rem; color: #d1d5db; }

        .input-control {
            width: 100%; padding: 12px 15px; background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px;
            color: white; font-family: inherit; font-size: 1rem; box-sizing: border-box; transition: 0.3s;
        }
        .input-control:focus { border-color: #4facfe; box-shadow: 0 0 12px rgba(79, 172, 254, 0.4); outline: none;}

        .btn-predict {
            width: 100%; padding: 15px; margin-top: 10px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: none; border-radius: 12px;
            color: #001220; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
        }
        .btn-predict:hover { transform: scale(1.03); box-shadow: 0 8px 25px rgba(0, 242, 254, 0.5); }

        /* Bảng Phun Kết Quả */
        .result-box {
            margin-top: 25px; padding: 20px; border-radius: 15px;
            background: rgba(79, 172, 254, 0.15); border: 1px solid rgba(79, 172, 254, 0.3);
            text-align: center; animation: hopUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes hopUp { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .score { font-size: 3rem; font-weight: 800; color: #4facfe; text-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
    </style>
</head>
<body>
<div class="glass-container">
    <h1>EDU Ai Predictor</h1>
    <div class="subtitle">Hệ thống Trí tuệ Nhân tạo Phân phối Đào tạo</div>

    <form action="/predict" method="post">
        <div class="input-group">
            <label>📚 Thời gian tự học ở nhà (Thang 1 tới 4)</label>
            <input type="number" step="1" name="studytime" class="input-control" required value="2" min="1" max="4">
        </div>
        <div class="input-group">
            <label>📝 Điểm thi đánh giá Năng lực Kỳ 1 (Thang 20)</label>
            <input type="number" step="0.5" name="g1" class="input-control" required value="10" min="0" max="20">
        </div>
        <div class="input-group">
            <label>📝 Điểm thi đánh giá Năng lực Kỳ 2 (Thang 20)</label>
            <input type="number" step="0.5" name="g2" class="input-control" required value="12" min="0" max="20">
        </div>
        <button type="submit" class="btn-predict">⚡ Kích Hoạt Mạng Nơ-ron Dự Đoán</button>
    </form>

    <div th:if="${score != null}" class="result-box">
        <div style="font-size: 1.1rem; color: #e2e8f0; margin-bottom: 5px;">Mô hình Gradient Descent kết luận:</div>
        <div class="score" th:text="${score} + ' Điểm'">--</div>
    </div>

    <div th:if="${error != null}" class="result-box" style="background: rgba(255, 71, 87, 0.15); border-color: rgba(255, 71, 87, 0.4);">
        <div style="color: #ff4757; font-weight: 600;" th:text="${error}">Lỗi Cổng Ngầm</div>
    </div>
</div>
</body>
</html>
